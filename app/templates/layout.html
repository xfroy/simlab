<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SimLab{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    /* ── Reset & Base ─────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #7d8590;
      --acc: #58a6ff;
      --green: #3fb950;
      --orange: #d29922;
      --red: #f85149;
      --purple: #a371f7;
      --font-mono: 'Space Mono', monospace;
      --font-body: 'Inter', sans-serif;
      --radius: 6px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Nav ──────────────────────────────────────────────────── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      height: 56px;
      gap: 2rem;
    }

    .nav-brand {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--acc);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .nav-brand span {
      color: var(--green);
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      margin-left: auto;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: color .2s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--text);
    }

    /* ── Layout ───────────────────────────────────────────────── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    /* ── Cards ────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .card-title {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: 1rem;
    }

    /* ── Forms ────────────────────────────────────────────────── */
    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: .35rem;
      font-weight: 500;
    }

    input[type=text],
    input[type=number] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.875rem;
      padding: .55rem .8rem;
      transition: border-color .2s;
      outline: none;
    }

    input[type=text]:focus,
    input[type=number]:focus {
      border-color: var(--acc);
    }

    /* ── Buttons ──────────────────────────────────────────────── */
    .btn {
      display: inline-block;
      padding: .6rem 1.3rem;
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: opacity .2s, transform .1s;
      text-decoration: none;
    }

    .btn:active {
      transform: scale(.98);
    }

    .btn-primary {
      background: var(--acc);
      color: #0d1117;
    }

    .btn-success {
      background: var(--green);
      color: #0d1117;
    }

    .btn-danger {
      background: var(--red);
      color: #fff;
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-ghost:hover {
      border-color: var(--acc);
      color: var(--acc);
    }

    .btn:hover {
      opacity: 0.88;
    }

    /* ── Grid ─────────────────────────────────────────────────── */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
    }

    /* ── Stat tiles ───────────────────────────────────────────── */
    .stat-tile {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: .3rem;
      font-family: var(--font-mono);
    }

    .stat-value {
      font-family: var(--font-mono);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
    }

    .stat-value.green {
      color: var(--green);
    }

    .stat-value.red {
      color: var(--red);
    }

    .stat-value.orange {
      color: var(--orange);
    }

    .stat-value.purple {
      color: var(--purple);
    }

    /* ── Alerts / Flash ───────────────────────────────────────── */
    .alert {
      padding: .75rem 1rem;
      border-radius: var(--radius);
      margin-bottom: 1rem;
      font-size: 0.875rem;
      border-left: 3px solid;
    }

    .alert-info {
      background: #0e2a3b;
      border-color: var(--acc);
    }

    .alert-warning {
      background: #2b1d00;
      border-color: var(--orange);
    }

    .alert-danger {
      background: #2d0f0f;
      border-color: var(--red);
    }

    .alert-success {
      background: #0e2b1a;
      border-color: var(--green);
    }

    /* ── Charts ───────────────────────────────────────────────── */
    .chart-img {
      width: 100%;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    /* ── Page header ──────────────────────────────────────────── */
    .page-header {
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .page-header h1 {
      font-family: var(--font-mono);
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: .25rem;
    }

    .page-header p {
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ── Badge ────────────────────────────────────────────────── */
    .badge {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      padding: .15rem .5rem;
      border-radius: 2rem;
      font-weight: 700;
      letter-spacing: .05em;
    }

    .badge-green {
      background: #0e2b1a;
      color: var(--green);
    }

    .badge-red {
      background: #2d0f0f;
      color: var(--red);
    }

    .badge-blue {
      background: #0e2a3b;
      color: var(--acc);
    }

    .badge-purple {
      background: #1e1338;
      color: var(--purple);
    }

    /* ── Responsive ───────────────────────────────────────────── */
    @media (max-width: 640px) {

      .grid-2,
      .grid-3,
      .grid-4 {
        grid-template-columns: 1fr;
      }

      nav {
        padding: 0 1rem;
      }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>

<body>

  <nav>
    <a class="nav-brand" href="{{ url_for('main.index') }}">
      Sim<span>Lab</span>
    </a>
    <div class="nav-links">
      <a href="{{ url_for('main.index') }}" class="{% if request.endpoint == 'main.index' %}active{% endif %}">
        Home
      </a>
      <a href="{{ url_for('main.monte_carlo') }}"
        class="{% if request.endpoint == 'main.monte_carlo' %}active{% endif %}">
        Monte Carlo
      </a>
      <a href="{{ url_for('main.portfolio') }}" class="{% if request.endpoint == 'main.portfolio' %}active{% endif %}">
        Portfolio
      </a>
    </div>
  </nav>

  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="alert alert-{{ cat }}">{{ msg }}</div>
    {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

</body>

</html>
